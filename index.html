<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RPT Purchase Order</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --blue:#2563eb; --blue-d:#1d4ed8; --blue-l:#eff6ff;
    --slate-900:#0f172a; --slate-800:#1e293b; --slate-700:#334155;
    --slate-500:#64748b; --slate-400:#94a3b8; --slate-300:#cbd5e1;
    --slate-200:#e2e8f0; --slate-100:#f1f5f9; --slate-50:#f8fafc;
    --green:#16a34a; --red:#dc2626; --amber:#d97706;
    --r:10px; --r-lg:16px;
    --sh:0 1px 2px rgba(15,23,42,.06),0 1px 3px rgba(15,23,42,.1);
    --sh-lg:0 10px 25px -5px rgba(15,23,42,.15),0 8px 10px -6px rgba(15,23,42,.1);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    color:var(--slate-800); background:var(--slate-100);
    font-size:15px; line-height:1.5; -webkit-font-smoothing:antialiased;
  }
  .tnum{font-variant-numeric:tabular-nums}
  button{font-family:inherit;cursor:pointer}
  input,textarea,select{font-family:inherit;font-size:15px}
  .hidden{display:none !important}

  /* ---- buttons ---- */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
    min-height:44px;padding:0 18px;border-radius:var(--r);border:1px solid transparent;
    font-weight:600;font-size:14px;transition:background .15s,border-color .15s,box-shadow .15s,transform .05s;}
  .btn:active{transform:translateY(1px)}
  .btn svg{width:18px;height:18px}
  .btn-primary{background:var(--blue);color:#fff}
  .btn-primary:hover{background:var(--blue-d)}
  .btn-ghost{background:#fff;color:var(--slate-700);border-color:var(--slate-300)}
  .btn-ghost:hover{background:var(--slate-50);border-color:var(--slate-400)}
  .btn-danger{background:#fff;color:var(--red);border-color:var(--slate-300)}
  .btn-danger:hover{background:#fef2f2;border-color:var(--red)}
  .btn-sm{min-height:36px;padding:0 12px;font-size:13px}
  .btn-block{width:100%}
  .btn:disabled{opacity:.5;cursor:not-allowed}

  /* ---- login ---- */
  #login{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px;
    background:radial-gradient(1200px 600px at 50% -10%,#1e293b,#0f172a);}
  .login-card{width:100%;max-width:400px;background:#fff;border-radius:var(--r-lg);
    box-shadow:var(--sh-lg);padding:32px;}
  .login-logo{display:block;width:140px;margin:4px auto 18px;}
  .login-card h1{font-size:18px;font-weight:700;text-align:center;margin:0 0 4px}
  .login-card p.sub{text-align:center;color:var(--slate-500);font-size:13px;margin:0 0 24px}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--slate-700);margin-bottom:6px}
  .field input,.field textarea,.field select{
    width:100%;min-height:44px;padding:10px 12px;border:1px solid var(--slate-300);
    border-radius:var(--r);background:#fff;color:var(--slate-900);transition:border-color .15s,box-shadow .15s;}
  .field textarea{min-height:80px;resize:vertical}
  .field input:focus,.field textarea:focus,.field select:focus{
    outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-l);}
  .pw-wrap{position:relative}
  .pw-wrap input{padding-right:46px}
  .pw-toggle{position:absolute;right:6px;top:50%;transform:translateY(-50%);
    background:none;border:none;color:var(--slate-500);padding:8px;border-radius:8px;display:flex}
  .pw-toggle:hover{color:var(--slate-700)}
  .err{color:var(--red);font-size:13px;margin-top:10px;min-height:18px;
    display:flex;align-items:center;gap:6px}

  /* ---- app shell ---- */
  #app{min-height:100dvh;display:flex;flex-direction:column}
  .topbar{position:sticky;top:0;z-index:40;background:#fff;border-bottom:1px solid var(--slate-200);
    display:flex;align-items:center;gap:12px;padding:10px 16px;box-shadow:var(--sh)}
  .topbar img{height:32px}
  .topbar .sep{width:1px;height:24px;background:var(--slate-200)}
  .topbar .title{font-weight:700;font-size:15px;color:var(--slate-900)}
  .topbar .spacer{flex:1}
  .topbar .user{font-size:13px;color:var(--slate-500);display:none}
  @media(min-width:640px){.topbar .user{display:inline}}
  .main{flex:1;width:100%;max-width:1100px;margin:0 auto;padding:20px 16px 60px}

  /* shared section card */
  .card{background:#fff;border:1px solid var(--slate-200);border-radius:var(--r-lg);box-shadow:var(--sh)}

  /* placeholder progress note */
  .stub{max-width:520px;margin:40px auto;text-align:center;color:var(--slate-500)}
  .stub h2{color:var(--slate-800)}

  /* ---- dashboard ---- */
  .page-head{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
  .page-head h1{font-size:20px;font-weight:700;margin:0;color:var(--slate-900)}
  .page-head .spacer{flex:1}
  .search{position:relative;flex:1;min-width:180px;max-width:340px}
  .search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--slate-400)}
  .search input{width:100%;min-height:44px;padding:10px 12px 10px 38px;border:1px solid var(--slate-300);border-radius:var(--r);background:#fff}
  .search input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-l)}

  .po-list{display:flex;flex-direction:column;gap:12px}
  .po-row{background:#fff;border:1px solid var(--slate-200);border-radius:var(--r-lg);box-shadow:var(--sh);
    padding:16px;display:flex;align-items:center;gap:16px;transition:border-color .15s,box-shadow .15s}
  .po-row:hover{border-color:var(--slate-300);box-shadow:var(--sh-lg)}
  .po-main{flex:1;min-width:0;cursor:pointer}
  .po-num{font-weight:700;color:var(--slate-900);font-size:15px}
  .po-recip{color:var(--slate-700);font-size:14px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .po-meta{color:var(--slate-500);font-size:12.5px;margin-top:4px;display:flex;gap:12px;flex-wrap:wrap}
  .po-total{font-weight:700;color:var(--slate-900);font-size:15px;text-align:right;white-space:nowrap}
  .po-actions{display:flex;gap:6px;flex-shrink:0}
  .icon-btn{width:40px;height:40px;display:inline-flex;align-items:center;justify-content:center;
    border:1px solid var(--slate-200);background:#fff;border-radius:var(--r);color:var(--slate-600);transition:.15s}
  .icon-btn:hover{background:var(--slate-50);color:var(--slate-900);border-color:var(--slate-300)}
  .icon-btn.danger:hover{color:var(--red);border-color:var(--red);background:#fef2f2}
  .icon-btn svg{width:18px;height:18px}
  @media(max-width:640px){
    .po-row{flex-wrap:wrap}
    .po-total{order:2;margin-left:auto}
    .po-actions{order:3;width:100%;justify-content:flex-end;border-top:1px solid var(--slate-100);padding-top:10px}
  }

  .empty{text-align:center;padding:60px 20px;color:var(--slate-500)}
  .empty svg{width:48px;height:48px;color:var(--slate-300);margin-bottom:12px}
  .empty h3{color:var(--slate-700);margin:0 0 4px;font-size:16px}
  .empty p{margin:0 0 20px;font-size:14px}

  /* toast */
  #toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
    background:var(--slate-900);color:#fff;padding:12px 18px;border-radius:var(--r);font-size:14px;font-weight:500;
    box-shadow:var(--sh-lg);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:100;max-width:90vw}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast.toast-ok{background:#14532d}
  #toast.toast-err{background:#7f1d1d}

  /* ---- editor ---- */
  .ed-top{display:flex;align-items:center;gap:12px;margin-bottom:16px}
  .ed-top h1{font-size:20px;font-weight:700;margin:0;color:var(--slate-900)}
  .ed-top .spacer{flex:1}
  .link-back{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--slate-600);font-weight:600;font-size:14px;padding:8px;border-radius:8px}
  .link-back:hover{background:var(--slate-200);color:var(--slate-900)}
  .link-back svg{width:18px;height:18px}

  .grid-2{display:grid;grid-template-columns:1fr;gap:16px;margin-bottom:16px}
  @media(min-width:860px){.grid-2{grid-template-columns:1fr 1fr}}

  .sec{padding:18px}
  .sec h2{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--slate-500);margin:0 0 14px}
  .frow{display:grid;grid-template-columns:1fr;gap:12px}
  .frow.two{grid-template-columns:1fr 1fr}
  @media(max-width:520px){.frow.two{grid-template-columns:1fr}}

  /* fixed company header card */
  .company{display:flex;gap:16px;align-items:flex-start;padding:18px;margin-bottom:16px;
    background:linear-gradient(180deg,#fff,var(--slate-50));border:1px solid var(--slate-200);border-radius:var(--r-lg);box-shadow:var(--sh)}
  .company img{height:54px;flex-shrink:0}
  .company .info{font-size:12.5px;color:var(--slate-600);line-height:1.55}
  .company .info b{display:block;font-size:15px;color:var(--slate-900);margin-bottom:3px;font-weight:700}
  .ro-tag{margin-left:auto;font-size:11px;font-weight:700;color:var(--slate-400);text-transform:uppercase;letter-spacing:.05em;align-self:center}

  /* item cards */
  .items-head{display:flex;align-items:center;margin-bottom:14px}
  .items-head h2{margin:0;flex:1}
  .item{border:1px solid var(--slate-200);border-radius:var(--r);padding:14px;margin-bottom:12px;background:var(--slate-50);position:relative}
  .item .item-no{position:absolute;top:-9px;left:14px;background:var(--blue);color:#fff;font-size:11px;font-weight:700;
    width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center}
  .item .rm{position:absolute;top:10px;right:10px;width:32px;height:32px;border-radius:8px;border:1px solid var(--slate-200);
    background:#fff;color:var(--slate-400);display:flex;align-items:center;justify-content:center}
  .item .rm:hover{color:var(--red);border-color:var(--red);background:#fef2f2}
  .item .rm svg{width:16px;height:16px}
  .item .frow{margin-top:4px}
  .item-line{margin-top:10px;text-align:right;font-size:13px;color:var(--slate-600)}
  .item-line b{color:var(--slate-900);font-weight:700}

  .input-prefix{position:relative}
  .input-prefix span{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--slate-400);font-size:13px;pointer-events:none}
  .input-prefix input{padding-left:42px}

  /* totals panel */
  .totals{padding:18px}
  .totals .trow{display:flex;justify-content:space-between;padding:8px 0;font-size:14px;color:var(--slate-700);border-bottom:1px dashed var(--slate-200)}
  .totals .trow span:last-child{font-weight:600;color:var(--slate-900)}
  .totals .grand{border-bottom:none;margin-top:6px;padding-top:14px;border-top:2px solid var(--slate-900)}
  .totals .grand span{font-size:18px;font-weight:800;color:var(--slate-900)}

  .sign-note{padding:18px;font-size:13px;color:var(--slate-600)}
  .sign-note b{color:var(--slate-900)}

  /* sticky save bar */
  .savebar{position:sticky;bottom:0;z-index:30;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);
    border-top:1px solid var(--slate-200);margin:24px -16px -60px;padding:14px 16px;display:flex;gap:10px;justify-content:flex-end}
  .savebar .spacer{flex:1}

  /* ---- PDF sheet (A4) ---- */
  #pdfHost{position:fixed;left:-9999px;top:0}
  .sheet{width:794px;background:#fff;color:#1a1a1a;padding:40px 44px;
    font-family:'Inter',Arial,sans-serif;font-size:11px;line-height:1.45;box-sizing:border-box}
  .sheet .s-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px}
  .sheet .s-head .co b{font-size:15px;font-weight:800;color:#0f172a;display:block;margin-bottom:5px}
  .sheet .s-head .co .ln{color:#334155;margin:1px 0}
  .sheet .s-head .co .lbl{display:inline-block;width:46px;color:#64748b}
  .sheet .s-head img{height:96px}
  .sheet .boxes{display:flex;gap:18px;margin-bottom:18px}
  .sheet .box{flex:1;border:1px solid #e2e8f0;border-radius:6px;overflow:hidden}
  .sheet .box .bt{background:#f1f5f9;font-weight:700;color:#0f172a;padding:7px 12px;border-bottom:1px solid #e2e8f0;font-size:11px}
  .sheet .box .bb{padding:10px 12px}
  .sheet .box .bb .r{display:flex;margin:2px 0}
  .sheet .box .bb .r .k{width:64px;color:#64748b;flex-shrink:0}
  .sheet .box .bb .r .k.w{width:84px}
  .sheet table.items{width:100%;border-collapse:collapse;margin-bottom:0}
  .sheet table.items th{background:#1e293b;color:#fff;font-weight:600;padding:8px 8px;text-align:left;font-size:10.5px}
  .sheet table.items th.num,.sheet table.items td.num{text-align:right}
  .sheet table.items th.c,.sheet table.items td.c{text-align:center}
  .sheet table.items td{padding:8px 8px;border-bottom:1px solid #e2e8f0;vertical-align:top}
  .sheet table.items td .iname{font-weight:600;color:#0f172a}
  .sheet table.items td .idesc{color:#475569;font-size:10px;margin-top:2px;white-space:pre-wrap}
  .sheet .lower{display:flex;gap:18px;margin-top:16px}
  .sheet .lower .left{flex:1.3}
  .sheet .lower .left .lbl{font-weight:700;color:#0f172a;margin-bottom:3px}
  .sheet .lower .left .val{color:#334155;white-space:pre-wrap;margin-bottom:12px;min-height:14px}
  .sheet .lower .right{flex:1}
  .sheet .tot{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #eef2f7}
  .sheet .tot .tlbl{color:#475569}
  .sheet .tot .tval{font-weight:600;color:#0f172a}
  .sheet .tot.grand{background:#1e293b;color:#fff;padding:9px 10px;border-radius:5px;border:none;margin-top:6px}
  .sheet .tot.grand .tlbl,.sheet .tot.grand .tval{color:#fff;font-weight:800;font-size:13px}
  .sheet .sign{margin-top:40px;display:flex;justify-content:flex-end}
  .sheet .sign .blk{text-align:center;min-width:240px}
  .sheet .sign .role{color:#475569;margin-bottom:110px}
  .sheet .sign .line{border-top:1px solid #0f172a;padding-top:5px;font-weight:700;color:#0f172a}
  .sheet .foot{margin-top:30px;padding-top:10px;border-top:1px solid #e2e8f0;color:#64748b;font-size:9px;line-height:1.5}
</style>
</head>

  // ---- calculation engine (single source of truth) ----
  function lineTotal(it){
    return (Number(it.qty)||0) * (Number(it.unitPrice)||0) - (Number(it.discount)||0);
  }
  function calcTotals(po){
    var items = (po && po.items) || [];
    var subtotal = items.reduce(function(s,it){ return s + (Number(it.qty)||0)*(Number(it.unitPrice)||0); }, 0);
    var discount = items.reduce(function(s,it){ return s + (Number(it.discount)||0); }, 0);
    var taxable  = subtotal - discount;
    var ppn      = taxable * 0.11;
    var miscFee  = Number(po && po.miscFee) || 0;
    var total    = taxable + ppn + miscFee;
    return { subtotal:subtotal, discount:discount, ppn:ppn, miscFee:miscFee, total:total };
  }

  // ---- STORE interface: list()->Promise<[po]>, get(id), save(po)->id, remove(id), duplicate(id)
  // localStore = browser-only fallback. firestoreStore = shared cloud (when configured).
  var localStore = (function(){
    var KEY = 'rpt_pos';
    function read(){ try{ return JSON.parse(localStorage.getItem(KEY)) || []; }catch(e){ return []; } }
    function write(a){ localStorage.setItem(KEY, JSON.stringify(a)); }
    function uid(){ return 'po_' + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
    var api = {
      list: function(){ return Promise.resolve(read().sort(function(a,b){return (b.updatedAt||0)-(a.updatedAt||0);})); },
      get:  function(id){ return Promise.resolve(read().filter(function(p){return p.id===id;})[0] || null); },
      save: function(po){
        var a = read(), now = Date.now();
        if(po.id){
          for(var i=0;i<a.length;i++){ if(a[i].id===po.id){ po.updatedAt=now; a[i]=po; write(a); return Promise.resolve(po.id);} }
        }
        po.id = uid(); po.createdAt = now; po.updatedAt = now; a.push(po); write(a);
        return Promise.resolve(po.id);
      },
      remove: function(id){ write(read().filter(function(p){return p.id!==id;})); return Promise.resolve(); },
      duplicate: function(id){
        var src = read().filter(function(p){return p.id===id;})[0];
        if(!src) return Promise.reject(new Error('Not found'));
        var copy = JSON.parse(JSON.stringify(src));
        delete copy.id; copy.po = copy.po || {}; copy.po.number = '';
        return api.save(copy);
      }
    };
    return api;
  })();

  // ---- Firestore-backed store (used when Firebase is configured) ----
  function makeFirestoreStore(db){
    var col = db.collection('purchaseOrders');
    function stripId(po){ var c = JSON.parse(JSON.stringify(po)); delete c.id; return c; }
    var api = {
      list: function(){
        return col.orderBy('updatedAt','desc').get().then(function(snap){
          var out=[]; snap.forEach(function(d){ var v=d.data(); v.id=d.id; out.push(v); }); return out;
        });
      },
      get: function(id){
        return col.doc(id).get().then(function(d){ if(!d.exists) return null; var v=d.data(); v.id=d.id; return v; });
      },
      save: function(po){
        var now = Date.now(), data = stripId(po); data.updatedAt = now;
        if(po.id){ return col.doc(po.id).set(data, {merge:true}).then(function(){ return po.id; }); }
        data.createdAt = now;
        return col.add(data).then(function(ref){ return ref.id; });
      },
      remove: function(id){ return col.doc(id).delete(); },
      duplicate: function(id){
        return api.get(id).then(function(src){
          if(!src) throw new Error('Not found');
          var copy = stripId(src); copy.po = copy.po || {}; copy.po.number = '';
          return api.save(copy);
        });
      }
    };
    return api;
  }

  // ---- enable Firebase if configured ----
  function initFirebase(){
    if(!USE_FIREBASE) return;
    try{
      firebase.initializeApp(firebaseConfig);
      var fbAuth = firebase.auth();
      var db = firebase.firestore();
      store = makeFirestoreStore(db);
      auth = {
        signIn: function(email, password){
          return fbAuth.signInWithEmailAndPassword(email, password)
            .catch(function(e){ throw new Error(fbAuthMsg(e)); });
        },
        signOut: function(){ fbAuth.signOut(); },
        watch: function(){
          fbAuth.onAuthStateChanged(function(user){
            if(user){ showApp(user.email); } else { showLogin(); }
          });
        }
      };
    }catch(e){
      console.error('Firebase init failed, staying in LOCAL mode:', e);
      USE_FIREBASE = false;
    }
  }
  function fbAuthMsg(e){
    var m = (e && e.code) || '';
    if(m.indexOf('wrong-password')>=0 || m.indexOf('invalid-credential')>=0 || m.indexOf('user-not-found')>=0)
      return 'Wrong email or password.';
    if(m.indexOf('too-many-requests')>=0) return 'Too many attempts. Try again later.';
    if(m.indexOf('network')>=0) return 'Network error. Check your connection.';
    return (e && e.message) || 'Sign in failed.';
  }

          '</div>' +
        '</div>' +
        '<div class="po-total tnum">'+ money(t.total) +'</div>' +
        '<div class="po-actions">' +
          '<button class="icon-btn" data-act="edit" title="Edit">'+ICON.edit+'</button>' +
          '<button class="icon-btn" data-act="dup" title="Duplicate">'+ICON.copy+'</button>' +
          '<button class="icon-btn" data-act="pdf" title="Export PDF">'+ICON.pdf+'</button>' +
          '<button class="icon-btn danger" data-act="del" title="Delete">'+ICON.trash+'</button>' +
        '</div>';
      row.querySelector('.po-main').addEventListener('click', function(){ openEditor(p.id); });
      row.querySelector('[data-act=edit]').addEventListener('click', function(){ openEditor(p.id); });
      row.querySelector('[data-act=dup]').addEventListener('click', function(){
        store.duplicate(p.id).then(function(){ toast('Duplicated','ok'); renderDashboard(); });
      });
      row.querySelector('[data-act=pdf]').addEventListener('click', function(){ exportPdf(p.id); });
      row.querySelector('[data-act=del]').addEventListener('click', function(){
        if(confirm('Delete PO '+(po.number||'')+'? This cannot be undone.')){
          store.remove(p.id).then(function(){ toast('Deleted'); renderDashboard(); });
        }
      });
      box.appendChild(row);
    });
  }

  // ---- fixed company (used by editor + PDF) ----
  var COMPANY = {
    name:'PT. Redimas Padangan Teknik',
    addr:['JL. Dr. Soetomo No. 107 RT 16 RW 05','Pengkok, Padangan, Bojonegoro','Jawa Timur (East Java) 62162'],
    email:'redimaspadanganteknik@gmail.com',
    npwp:'1000 0000 0826 6804',
    phone:['628129333310','6282245104510'],
    director:'Drs EC. Moch. Pantja Darmono'
  };

  function todayISO(){ var d=new Date(); return d.toISOString().slice(0,10); }
  function blankItem(){ return {name:'',desc:'',qty:1,unit:'',unitPrice:0,discount:0}; }
  function blankPO(){ return {recipient:{},po:{number:'',date:todayISO(),projectWO:''},items:[blankItem()],notes:'',deliveryAddress:'',miscFee:0}; }

  // ---- EDITOR ----
  var _edit = { id:null };

  function openEditor(id){
    if(id){ store.get(id).then(function(po){ if(po){_edit.id=po.id; renderEditor(po);} else {toast('Not found','err'); renderDashboard();} }); }
    else { _edit.id=null; renderEditor(blankPO()); }
  }

  function fld(label, attr, val, opts){
    opts = opts||{};
    var type = opts.type||'text';
    var inp;
    if(opts.textarea){
      inp = '<textarea '+attr+' placeholder="'+(opts.ph||'')+'">'+escapeHtml(val||'')+'</textarea>';
    } else if(opts.prefix){
      inp = '<div class="input-prefix"><span>'+opts.prefix+'</span><input '+attr+' type="'+type+'" '+
            (opts.inputmode?'inputmode="'+opts.inputmode+'" ':'')+'value="'+escapeHtml(val==null?'':val)+'" placeholder="'+(opts.ph||'')+'" /></div>';
    } else {
      inp = '<input '+attr+' type="'+type+'" '+(opts.inputmode?'inputmode="'+opts.inputmode+'" ':'')+
            'value="'+escapeHtml(val==null?'':val)+'" placeholder="'+(opts.ph||'')+'" />';
    }
    return '<div class="field"><label>'+label+'</label>'+inp+'</div>';
  }

  function renderEditor(po){
    var r = po.recipient||{}, p = po.po||{};
    var view = $('#view');
    view.innerHTML =
      '<div class="ed-top">' +
        '<button class="link-back" id="backBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>Back</button>' +
        '<h1>'+(_edit.id?'Edit':'New')+' Purchase Order</h1>' +
      '</div>' +

      '<div class="company">' +
        '<img src="'+RPT_LOGO+'" alt="RPT" />' +
        '<div class="info"><b>'+COMPANY.name+'</b>'+COMPANY.addr.join('<br>')+'<br>'+
          'Email: '+COMPANY.email+'<br>NPWP: '+COMPANY.npwp+'<br>Phone: '+COMPANY.phone.join(' / ')+'</div>' +
        '<span class="ro-tag">Sender</span>' +
      '</div>' +

      '<div class="grid-2">' +
        '<div class="card sec"><h2>Recipient</h2>' +
          fld('Name','data-r="name"', r.name, {ph:'CV. / PT. ...'}) +
          fld('Address','data-r="address"', r.address, {textarea:true, ph:'Street, city, province'}) +
          '<div class="frow two">' + fld('Attn.','data-r="attn"', r.attn) + fld('Phone','data-r="phone"', r.phone, {inputmode:'tel'}) + '</div>' +
          '<div class="frow two">' + fld('Fax','data-r="fax"', r.fax) + fld('Email','data-r="email"', r.email, {type:'email', inputmode:'email'}) + '</div>' +
        '</div>' +
        '<div class="card sec"><h2>Purchase Order</h2>' +
          fld('PO Number','data-p="number"', p.number, {ph:'359/RPT-PO/06/2026'}) +
          fld('Date','data-p="date"', p.date, {type:'date'}) +
          fld('Project / WO','data-p="projectWO"', p.projectWO, {ph:'025/RPT/WO/06-26'}) +
        '</div>' +
      '</div>' +

      '<div class="card sec">' +
        '<div class="items-head"><h2>Items</h2><button class="btn btn-ghost btn-sm" id="addItem">'+ICON.plus+'Add item</button></div>' +
        '<div id="itemsBox"></div>' +
      '</div>' +

      '<div class="grid-2">' +
        '<div class="card sec"><h2>Notes &amp; Delivery</h2>' +
          fld('Notes','data-notes', po.notes, {textarea:true, ph:'Internal notes shown on the PO'}) +
          fld('Delivery to Address','data-delivery', po.deliveryAddress, {textarea:true, ph:'Where goods are delivered'}) +
        '</div>' +
        '<div class="card totals"><h2 style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--slate-500);margin:0 0 8px">Summary</h2>' +
          '<div class="trow"><span>Sub Total</span><span class="tnum" id="tSub">IDR 0</span></div>' +
          '<div class="trow"><span>Discount</span><span class="tnum" id="tDisc">IDR 0</span></div>' +
          '<div class="trow"><span>PPN (11%)</span><span class="tnum" id="tPpn">IDR 0</span></div>' +
          '<div class="trow"><span>Misc. Fee</span>' +
            '<span class="input-prefix" style="max-width:160px"><span>IDR</span>' +
            '<input data-misc type="number" inputmode="decimal" min="0" step="any" value="'+(Number(po.miscFee)||0)+'" style="min-height:38px;width:160px;text-align:right;border:1px solid var(--slate-300);border-radius:8px;padding:6px 10px 6px 42px" /></span>' +
          '</div>' +
          '<div class="trow grand"><span>Total</span><span class="tnum" id="tTotal">IDR 0</span></div>' +
        '</div>' +
      '</div>' +

      '<div class="card sign-note">Signature on PDF — <b>Director</b>: '+COMPANY.director+'</div>' +

      '<div class="savebar">' +
        '<button class="btn btn-ghost" id="cancelBtn">Cancel</button>' +
        '<span class="spacer"></span>' +
        '<button class="btn btn-ghost" id="savePdfBtn">'+ICON.pdf+'Save &amp; PDF</button>' +
        '<button class="btn btn-primary" id="saveBtn">Save</button>' +
      '</div>';

    // render items
    _edit.items = (po.items && po.items.length) ? po.items.slice() : [blankItem()];
    renderItems();

    // bind
    $('#backBtn').addEventListener('click', renderDashboard);
    $('#cancelBtn').addEventListener('click', renderDashboard);
    $('#addItem').addEventListener('click', function(){ _edit.items.push(blankItem()); renderItems(); });
    view.addEventListener('input', recalc);
    $('#saveBtn').addEventListener('click', function(){ doSave(false); });
    $('#savePdfBtn').addEventListener('click', function(){ doSave(true); });
    recalc();
  }

  function renderItems(){
    var box = $('#itemsBox'); box.innerHTML='';
    _edit.items.forEach(function(it, idx){
      var d = el('div','item');
      d.innerHTML =
        '<span class="item-no">'+(idx+1)+'</span>' +
        '<button class="rm" title="Remove" data-rm="'+idx+'">'+ICON.trash+'</button>' +
        '<div class="frow two">' +
          fld('Item name','data-i="name"', it.name, {ph:'e.g. Fabrication of Ring Fan'}) +
          fld('Unit','data-i="unit"', it.unit, {ph:'Ea / Pcs / Set'}) +
        '</div>' +
        fld('Description','data-i="desc"', it.desc, {textarea:true, ph:'Material, spec, notes'}) +
        '<div class="frow two">' +
          fld('Qty','data-i="qty"', it.qty, {type:'number', inputmode:'decimal'}) +
          fld('Unit Price','data-i="unitPrice"', it.unitPrice, {type:'number', inputmode:'decimal', prefix:'IDR'}) +
        '</div>' +
        fld('Total Discount','data-i="discount"', it.discount, {type:'number', inputmode:'decimal', prefix:'IDR'}) +
        '<div class="item-line">Line total: <b class="tnum" data-line>IDR 0</b></div>';
      d.querySelector('[data-rm]').addEventListener('click', function(){
        if(_edit.items.length<=1){ toast('At least one item required'); return; }
        _edit.items.splice(idx,1); renderItems(); recalc();
      });
      box.appendChild(d);
    });
    recalc();
  }

  // read DOM -> model
  function collect(){
    var po = { recipient:{}, po:{}, items:[] };
    $$('[data-r]').forEach(function(n){ po.recipient[n.getAttribute('data-r')] = n.value; });
    $$('[data-p]').forEach(function(n){ po.po[n.getAttribute('data-p')] = n.value; });
    var notes = $('[data-notes]'), del = $('[data-delivery]'), misc = $('[data-misc]');
    po.notes = notes ? notes.value : '';
    po.deliveryAddress = del ? del.value : '';
    po.miscFee = misc ? (Number(misc.value)||0) : 0;
    $$('.item').forEach(function(itemEl){
      var it = {};
      $$('[data-i]', itemEl).forEach(function(n){
        var k = n.getAttribute('data-i');
        it[k] = (k==='qty'||k==='unitPrice'||k==='discount') ? (Number(n.value)||0) : n.value;
      });
      po.items.push(it);
    });
    return po;
  }

  function recalc(){
    if(!$('#itemsBox')) return;
    var po = collect();
    // per-line
    $$('.item').forEach(function(itemEl,i){
      var b = itemEl.querySelector('[data-line]');
      if(b) b.textContent = money(lineTotal(po.items[i]||{}));
    });
    var t = calcTotals(po);
    if($('#tSub'))   $('#tSub').textContent   = money(t.subtotal);
    if($('#tDisc'))  $('#tDisc').textContent  = money(t.discount);
    if($('#tPpn'))   $('#tPpn').textContent   = money(t.ppn);
    if($('#tTotal')) $('#tTotal').textContent = money(t.total);
  }

  function doSave(thenPdf){
    var po = collect();
    if(_edit.id) po.id = _edit.id;
    if(!po.po.number){ if(!confirm('No PO number entered. Save anyway?')) return; }
    $('#saveBtn').disabled = true;
    store.save(po).then(function(id){
      _edit.id = id;
      toast('Saved','ok');
      if(thenPdf){ exportPdf(id); }
      else { renderDashboard(); }
    }).catch(function(e){ toast('Save failed: '+e.message,'err'); })
      .finally(function(){ var b=$('#saveBtn'); if(b) b.disabled=false; });
  }

  // ---- PDF EXPORT ----
  function buildSheet(po){
    var r = po.recipient||{}, p = po.po||{}, t = calcTotals(po);
    var rows = (po.items||[]).map(function(it,i){
      return '<tr>' +
        '<td class="c">'+(i+1)+'</td>' +
        '<td><div class="iname">'+escapeHtml(it.name||'')+'</div>'+(it.desc?'<div class="idesc">'+escapeHtml(it.desc)+'</div>':'')+'</td>' +
        '<td class="c">'+escapeHtml(it.qty!=null?it.qty:'')+'</td>' +
        '<td class="c">'+escapeHtml(it.unit||'')+'</td>' +
        '<td class="num tnum">'+money(it.unitPrice)+'</td>' +
        '<td class="num tnum">'+money(it.discount)+'</td>' +
        '<td class="num tnum">'+money(lineTotal(it))+'</td>' +
      '</tr>';
    }).join('');

    function recipRow(k,v){ return v ? '<div class="r"><span class="k">'+k+'</span><span>'+escapeHtml(v)+'</span></div>' : ''; }

    return '' +
      '<div class="sheet">' +
        '<div class="s-head">' +
          '<div class="co">' +
            '<b>'+COMPANY.name+'</b>' +
            COMPANY.addr.map(function(a){return '<div class="ln">'+a+'</div>';}).join('') +
            '<div class="ln"><span class="lbl">Phone</span>: '+COMPANY.phone.join(' / ')+'</div>' +
            '<div class="ln"><span class="lbl">Email</span>: '+COMPANY.email+'</div>' +
            '<div class="ln"><span class="lbl">NPWP</span>: '+COMPANY.npwp+'</div>' +
          '</div>' +
          '<img src="'+RPT_LOGO+'" alt="RPT" />' +
        '</div>' +

        '<div class="boxes">' +
          '<div class="box"><div class="bt">Recipient</div><div class="bb">' +
            '<div class="r"><span>'+escapeHtml(r.name||'—')+'</span></div>' +
            (r.address?'<div class="r" style="margin:4px 0"><span style="white-space:pre-wrap">'+escapeHtml(r.address)+'</span></div>':'') +
            recipRow('Attn.', r.attn) + recipRow('Phone', r.phone) + recipRow('Fax', r.fax) + recipRow('Email', r.email) +
          '</div></div>' +
          '<div class="box"><div class="bt">Purchase Order</div><div class="bb">' +
            '<div class="r"><span class="k w">PO Number</span><span>: '+escapeHtml(p.number||'')+'</span></div>' +
            '<div class="r"><span class="k w">Date</span><span>: '+escapeHtml(p.date||'')+'</span></div>' +
            '<div class="r"><span class="k w">Project/WO</span><span>: '+escapeHtml(p.projectWO||'')+'</span></div>' +
          '</div></div>' +
        '</div>' +

        '<table class="items"><thead><tr>' +
          '<th class="c" style="width:28px">No.</th><th>Item / Description</th>' +
          '<th class="c" style="width:38px">Qty</th><th class="c" style="width:44px">Unit</th>' +
          '<th class="num" style="width:96px">Unit Price</th><th class="num" style="width:88px">Discount</th>' +
          '<th class="num" style="width:100px">Total Price</th>' +
        '</tr></thead><tbody>'+ (rows||'<tr><td colspan="7" class="c" style="color:#94a3b8;padding:18px">No items</td></tr>') +'</tbody></table>' +

        '<div class="lower">' +
          '<div class="left">' +
            '<div class="lbl">Notes</div><div class="val">'+escapeHtml(po.notes||'')+'</div>' +
            '<div class="lbl">Delivery to</div><div class="val">'+escapeHtml(po.deliveryAddress||'')+'</div>' +
          '</div>' +
          '<div class="right">' +
            '<div class="tot"><span class="tlbl">Sub Total</span><span class="tval tnum">'+money(t.subtotal)+'</span></div>' +
            '<div class="tot"><span class="tlbl">Discount</span><span class="tval tnum">'+money(t.discount)+'</span></div>' +
            '<div class="tot"><span class="tlbl">PPN (11%)</span><span class="tval tnum">'+money(t.ppn)+'</span></div>' +
            '<div class="tot"><span class="tlbl">Misc. Fee</span><span class="tval tnum">'+money(t.miscFee)+'</span></div>' +
            '<div class="tot grand"><span class="tlbl">Total</span><span class="tval tnum">'+money(t.total)+'</span></div>' +
          '</div>' +
        '</div>' +

        '<div class="sign"><div class="blk"><div class="role">Director</div><div class="line">'+COMPANY.director+'</div></div></div>' +

        '<div class="foot">' +
          'Harap cantumkan nomor PO ini dalam Surat Pengantar Barang (SPB) &amp; Invoice.<br>' +
          'Faktur pajak diterima paling lambat Tgl: 5 (Lima) bulan berikutnya.' +
        '</div>' +
      '</div>';
  }

  function safeName(s){ return String(s||'').replace(/[\\/:*?"<>|]+/g,'-').replace(/\s+/g,' ').trim(); }

  function exportPdf(id){
    store.get(id).then(function(po){
      if(!po){ toast('Not found','err'); return; }
      if(typeof html2pdf === 'undefined'){ toast('PDF library not loaded (check connection)','err'); return; }
      var host = $('#pdfHost');
      host.innerHTML = buildSheet(po);
      var sheet = host.firstChild;
      var num = (po.po && po.po.number) || 'draft';
      var filename = 'PO - ' + safeName(num) + ' - Redimas Padangan Teknik.pdf';
      toast('Generating PDF…');
      html2pdf().set({
        filename: filename,
        margin: 0,
        image: { type:'jpeg', quality:0.98 },
        html2canvas: { scale:2, useCORS:true, backgroundColor:'#ffffff' },
        jsPDF: { unit:'mm', format:'a4', orientation:'portrait' },
        pagebreak: { mode:['css','legacy'] }
      }).from(sheet).save().then(function(){
        host.innerHTML='';
        toast('PDF downloaded','ok');
      }).catch(function(e){
        host.innerHTML='';
        toast('PDF failed: '+e.message,'err');
      });
    });
  }

  // ---- password show/hide ----
  $('#pwToggle').addEventListener('click', function(){
    var inp = $('#password');
    inp.type = inp.type === 'password' ? 'text' : 'password';
    this.setAttribute('aria-label', inp.type === 'password' ? 'Show password' : 'Hide password');
  });

  // ---- auth wiring (uses Firebase when configured, else local) ----
  initFirebase();

  $('#loginForm').addEventListener('submit', function(e){
    e.preventDefault();
    var btn = $('#loginBtn'), err = $('#loginErr');
    err.textContent = '';
    btn.disabled = true; btn.textContent = 'Signing in…';
    auth.signIn($('#email').value.trim(), $('#password').value)
      .then(function(res){
        if(!USE_FIREBASE){ sessionStorage.setItem('rpt_user', (res&&res.email)||''); showApp((res&&res.email)||''); }
        // Firebase path: onAuthStateChanged drives showApp automatically.
      })
      .catch(function(ex){ err.textContent = ex.message; })
      .finally(function(){ btn.disabled = false; btn.textContent = 'Sign in'; });
  });

  $('#logoutBtn').addEventListener('click', function(){ auth.signOut(); });

  // restore / watch session
  auth.watch();

  window.RPT = { showApp:showApp, showLogin:showLogin, $:$, calcTotals:calcTotals };
})();
</script>
